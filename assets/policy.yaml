# Manus Orchestrator Policy
# Fully soft-coded. No hardcoding.
# All judgment criteria are externalized here.
version: 2

# Execution Model
# CC launches with ccd (claude --dangerously-skip-permissions) = Bypass mode.
# All CC-side approval dialogs are disabled.
# The approval lists below serve as Manus's autonomous judgment criteria, not CC's.
execution_mode:
  cc_launch: "ccd"  # claude --dangerously-skip-permissions
  cc_permissions: bypass  # No CC-side guards
  safety_layer: manus_only  # Manus is the sole safety layer
  default_start: plan_mode  # Always start with Plan Mode

session:
  max_duration_minutes: 120
  max_cost_usd: 50
  context_budget_percent: 60
  auto_compact_threshold_percent: 50
  log_directory: ".manus/session-logs"

approval:
  # In Bypass mode, these don't affect CC. They serve as Manus's internal judgment criteria.
  always_allow:
    - file_read
    - file_write
    - file_create
    - test_run
    - git_branch_ops
    - git_commit
    - lint_format
    - grep_glob_search
  ask_once:
    - package_install
    - external_api_call
    - git_push
    - agent_spawn
  always_deny:
    - git_force_push
    - production_deploy
    - database_migration_prod
    - secret_modification
    - main_branch_direct_push

escalation:
  triggers:
    - security_decision
    - architecture_change
    - cost_threshold_exceeded
    - consecutive_errors: 3
    - data_loss_risk
    - third_party_service_auth
  method: pause_and_notify
  notification: |
    [ESCALATION] Manus has paused the session.
    Human judgment required. Reason: {reason}

workflow:
  enabled: false
  custom_commands: []
  # Add your project management commands here

improvement:
  post_session_retro: true
  update_policy_on_retro: true
  track_approval_patterns: true
  retro_output: ".manus/retros/"
  pattern_graduation_threshold: 3
